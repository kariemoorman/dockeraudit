# Hardened MongoDB 7 StatefulSet
# Controls: RUNTIME-001, RUNTIME-003, RUNTIME-004, RUNTIME-005, RUNTIME-008, RUNTIME-012,
#   DB-K8S-001, DB-K8S-002, DB-K8S-003, DB-K8S-004, DB-K8S-005, SECRETS-001
apiVersion: v1
kind: Secret
metadata:
  name: mongo-credentials
  namespace: production
type: Opaque
stringData:
  mongo-user: "REPLACE_WITH_ADMIN_USER"
  mongo-password: "REPLACE_WITH_STRONG_PASSWORD_VIA_SEALED_SECRETS_OR_ESO"
  mongo-tls.pem: "REPLACE_WITH_COMBINED_CERT_AND_KEY_PEM"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: production
  labels:
    app: mongodb
    tier: database
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
        tier: database
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: mongodb
        image: mongo:7
        command:
        - mongod
        - "--auth"
        - "--bind_ip_all"
        - "--tlsMode"
        - "requireTLS"
        - "--tlsCertificateKeyFile"
        - "/run/secrets/mongo-tls.pem"
        env:
        - name: MONGO_INITDB_ROOT_USERNAME_FILE
          value: /run/secrets/mongo-user
        - name: MONGO_INITDB_ROOT_PASSWORD_FILE
          value: /run/secrets/mongo-password
        ports:
        - containerPort: 27017
          protocol: TCP
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          privileged: false
          capabilities:
            drop: [ALL]
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - mongosh
            - "--eval"
            - "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 5
          timeoutSeconds: 10
        readinessProbe:
          exec:
            command:
            - mongosh
            - "--eval"
            - "db.adminCommand('ping')"
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 5
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
        - name: mongo-configdb
          mountPath: /data/configdb
        - name: mongo-secret
          mountPath: /run/secrets
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: mongo-secret
        secret:
          secretName: mongo-credentials
          defaultMode: 0400
      - name: mongo-configdb
        emptyDir: {}
      - name: tmp
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes: [ReadWriteOnce]
      storageClassName: encrypted-ssd
      resources:
        requests:
          storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: production
spec:
  type: ClusterIP
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
    protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mongodb-isolate
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: mongodb
  policyTypes: [Ingress, Egress]
  ingress:
  - from:
    - podSelector:
        matchLabels:
          role: backend
    ports:
    - port: 27017
  egress: []
