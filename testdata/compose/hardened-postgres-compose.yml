# Hardened PostgreSQL 16 Docker Compose
# Controls satisfied: non-root execution, read-only root FS, cap drop ALL,
#   no-new-privileges, secrets via file (not ENV), resource limits, healthcheck
# Usage:
#   1. Create secret files: echo -n "strongpassword" > ./secrets/postgres-password
#   2. chmod 400 ./secrets/postgres-password
#   3. docker compose -f hardened-postgres-compose.yml up -d

version: "3.9"

secrets:
  postgres-password:
    file: ./secrets/postgres-password   # Never commit this file; manage via Vault/SOPS

volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/postgres            # Use encrypted volume or filesystem

networks:
  db-net:
    driver: bridge
    internal: true                      # No external connectivity from this network

services:
  postgres:
    image: postgres:16-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    restart: unless-stopped
    user: "999:999"                     # Non-root: postgres UID/GID
    read_only: true                     # Read-only root filesystem
    security_opt:
      - no-new-privileges:true          # Prevent SUID privilege escalation
    cap_drop:
      - ALL                             # Drop all Linux capabilities
    tmpfs:
      - /tmp:mode=1777,size=64m         # Writable /tmp in memory
      - /var/run/postgresql:mode=0755,uid=999,gid=999  # Socket directory
    secrets:
      - postgres-password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-password
      POSTGRES_USER: appuser
      POSTGRES_DB: appdb
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - db-net
    ports: []                           # No ports exposed to host; access via network only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
