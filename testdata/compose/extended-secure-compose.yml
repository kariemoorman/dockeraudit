# Extended secure Docker Compose — covers controls not in secure-compose.yml
# Controls tested: RUNTIME-008 (PASS), RUNTIME-015 (PASS), RUNTIME-016 (PASS),
#   DB-IMAGE-002 (PASS), IMAGE-008 (PASS), IMAGE-001 (PASS), DAEMON-004 (PASS)

services:
  api:
    image: node:22-alpine@sha256:abc123def456abc123def456abc123def456abc123def456abc123def456abc1
    user: "1001:1001"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp=default.json
    environment:
      DOCKER_CONTENT_TRUST: "1"
      # PASS: DAEMON-004 — Content trust enabled; only signed images can be pulled
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    ulimits:
      nproc: 1024
      nofile:
        soft: 65536
        hard: 65536
    restart: on-failure:5
    ports:
      - "3000:3000"

  redis-secure:
    image: redis:7-alpine@sha256:abc123def456abc123def456abc123def456abc123def456abc123def456abc1
    user: "999:999"
    read_only: true
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "256mb"]
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    ulimits:
      nproc: 512
      nofile:
        soft: 65536
        hard: 65536
    restart: on-failure:5
