# Intentionally insecure Docker Compose file for testing
version: "3.9"

services:
  webapp:
    image: nginx:latest
    privileged: true
    network_mode: host
    ports:
      - "80:80"
      - "443:443"
    environment:
      DB_PASSWORD: supersecret123
      API_TOKEN: ghp_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefgh12
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # VIOLATION: DAEMON-001 — Docker socket exposed to container
      # VIOLATION: RUNTIME-009 — Sensitive host path mounted

  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: password123
    pid: host
